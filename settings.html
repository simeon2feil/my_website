<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <nav class="top-nav">
      <a class="brand" href="index.html">Simeon</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="nav-actions">
        <div class="clock" id="live-clock" aria-live="polite"></div>
        <select class="theme-toggle" data-theme-select aria-label="Choose theme">
          <option value="default">Default</option>
          <option value="white">White</option>
          <option value="green">Green</option>
          <option value="yellow">Yellow</option>
          <option value="black">Black</option>
        </select>
        <button class="theme-toggle" data-theme-toggle type="button">Theme: default</button>
      </div>
    </nav>

    <main class="page">
      <section class="card settings-card">
        <h1>Settings</h1>
        <p>Adjust the look and feel of the website.</p>

        <div class="settings-grid">
          <div class="setting-row">
            <span>Theme picker</span>
            <div class="setting-actions">
              <select class="theme-toggle" data-theme-select aria-label="Choose theme">
                <option value="default">Default</option>
                <option value="white">White</option>
                <option value="green">Green</option>
                <option value="yellow">Yellow</option>
                <option value="black">Black</option>
              </select>
              <button class="theme-toggle" data-theme-toggle type="button">Theme: default</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>© <span id="year"></span> Simeon Feil · All rights reserved.</p>
    </footer>

    <script src="JavaScript.js"></script>
  </body>
</html>
